function worldFloorHeightAt(x, z) {

    // terrain
    let ground = h(x, z);

    // road
    const road = roadHeightAt(x, z);

    if (road !== null) {
        ground = Math.max(ground, road);
    }

    // invisible world floor
    ground = Math.max(ground, WORLD_FLOOR_Y);

    return ground;
}



function roadHeightAt(x, z) {
    const centerX = roadCenter(z);
    const roadWidth = 12;
    if (Math.abs(x - centerX) < roadWidth / 2) {
        // Use the same logic as makeRoadChunk for road height
        let samples = 7;
        let sum = 0;
        for (let s = -3; s <= 3; s++) {
            let sampleX = centerX + (s * roadWidth / 6);
            sum += h(sampleX, z);
        }
        let avg = sum / samples;
        let blend = 0.9;
        let roadY = avg * blend + h(x, z) * (1 - blend);
        roadY += 0.1; // match road mesh offset
        return roadY + 0.2; // match mesh offset
    } else {
        return null;
    }
}






function h(x,z){
    return (
        Math.sin(x*0.01)*14 +
        Math.cos(z*0.01)*14 +
        Math.sin((x+z)*0.02)*10 +
        Math.sin(x*0.05)*2 +
        Math.cos(z*0.05)*2
    );
}

function nrm(x,z){
    const e=0.5;
    return new THREE.Vector3(
        h(x-e,z)-h(x+e,z),
        2,
        h(x,z-e)-h(x,z+e)
    ).normalize();
}

addEventListener("keydown",e=>keys[e.code]=true);

const trees = [];

const CHUNK_RADIUS = 2;

function key(x,z){return x+","+z;}

function unloadChunk(cx, cz) {

    const k = key(cx, cz);

    const chunk = chunks.get(k);

    if (!chunk) return;

    scene.remove(chunk.group);

    chunk.group.traverse(obj => {

        if (obj.geometry) {
            obj.geometry.dispose();
        }

        if (obj.material) {

            if (Array.isArray(obj.material)) {

                obj.material.forEach(m => m.dispose());

            } else {

                obj.material.dispose();
            }
        }
    });

    // remove trees from collision list

    for (const t of chunk.trees) {

        const index = trees.indexOf(t);

        if (index !== -1) {
            trees.splice(index, 1);
        }
    }

    chunks.delete(k);
}

function getCarTiltFromWheels(carPos, yaw, wheels) {

    const localOffsets = [
        { x: -1.2, z:  1.4 },
        { x:  1.2, z:  1.4 },
        { x: -1.2, z: -1.4 },
        { x:  1.2, z: -1.4 }
    ];

    const distances = localOffsets.map(off => {

        const wx =
            carPos.x +
            off.x * Math.cos(yaw) -
            off.z * Math.sin(yaw);

        const wz =
            carPos.z +
            off.x * Math.sin(yaw) +
            off.z * Math.cos(yaw);

        const gy = worldFloorHeightAt(wx, wz);

        return carPos.y - gy;
    });

    const frontAvg = (distances[0] + distances[1]) * 0.5;
    const rearAvg  = (distances[2] + distances[3]) * 0.5;
    const leftAvg  = (distances[0] + distances[2]) * 0.5;
    const rightAvg = (distances[1] + distances[3]) * 0.5;

    const wheelBase =
        Math.abs(localOffsets[0].z - localOffsets[2].z);

    const trackWidth =
        Math.abs(localOffsets[1].x - localOffsets[0].x);

    let pitch =
        Math.atan2(rearAvg - frontAvg, wheelBase);

    let roll =
        Math.atan2(rightAvg - leftAvg, trackWidth);

    pitch = -pitch;
    roll = -roll;

    let normYaw =
        (yaw % (2 * Math.PI) + 2 * Math.PI) %
        (2 * Math.PI);

    if (
        normYaw > Math.PI / 2 &&
        normYaw < 3 * Math.PI / 2
    ) {
        pitch = -pitch;
        roll = -roll;
    }

    return { pitch, roll };
}

function makeTree(x, z) {

    if (isOnRoad(x, z)) return null;

    const g = new THREE.Group();

    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5, 0.6, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0x6b4423 })
    );

    const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(3, 6, 10),
        new THREE.MeshStandardMaterial({ color: 0x228833 })
    );

    trunk.position.y = 2;
    leaves.position.y = 6;

    trunk.castShadow = true;

    // BIG FPS BOOST
    leaves.castShadow = false;

    g.add(trunk);
    g.add(leaves);

    const y = h(x, z);

    g.position.set(x, y, z);

    g.userData.isTree = true;

    return g;
}




function roadCenter(z){
    return Math.sin(z * 0.01) * 25 + Math.sin(z * 0.003) * 60;
}


function carIsOnRoad() {
    return isOnRoad(car.position.x, car.position.z);
}




function makeRoadChunk(cx, cz) {

    const roadWidth = 12;
    const segments = 60;

    // MINIMUM ROAD HEIGHT
    const MIN_ROAD_Y = WATER_LEVEL + 4;

    const geo = new THREE.PlaneGeometry(
        roadWidth,
        size,
        1,
        segments
    );

    geo.rotateX(-Math.PI / 2);

    const pos = geo.attributes.position;

    for (let i = 0; i < pos.count; i++) {

        const x = pos.getX(i);
        const z = pos.getZ(i);

        const worldZ = cz * size + z;

        const centerX = roadCenter(worldZ);
        const worldX = centerX + x;

        // Sample surrounding terrain
        let samples = 7;
        let sum = 0;

        for (let s = -3; s <= 3; s++) {

            let sampleX =
                centerX +
                (s * roadWidth / 6);

            sum += h(sampleX, worldZ);
        }

        let avg = sum / samples;

        let blend = 0.9;

        let roadY =
            avg * blend +
            h(worldX, worldZ) * (1 - blend);

        // Original road offset
        roadY += 0.1;

        // FORCE ROAD ABOVE WATER / LOWLANDS
        if (roadY < MIN_ROAD_Y) {

            // smooth lifting instead of hard snap
            const liftStrength = 0.85;

            roadY =
                roadY * (1 - liftStrength) +
                MIN_ROAD_Y * liftStrength;
        }

        pos.setX(i, worldX - cx * size);

        pos.setY(i, roadY + 0.2);
    }

    geo.computeVertexNormals();

    const mesh = new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({
            color: 0x333333,
            roughness: 1
        })
    );

    mesh.position.set(
        cx * size,
        0.1,
        cz * size
    );

    mesh.receiveShadow = true;

    return mesh;
}



function isOnRoad(x, z) {
    const centerX = roadCenter(z);
    return Math.abs(x - centerX) < 7;
}



function makeBush(x, z) {

    const bush = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0x2f7d32 })
    );

    bush.position.set(x, h(x, z), z);

    // BIG FPS BOOST
    bush.castShadow = false;

    bush.userData.isBush = true;

    return bush;
}

function makeChunk(cx, cz) {

    const group = new THREE.Group();

    // ROAD

    const road = makeRoadChunk(cx, cz);

    group.add(road);

    // VEGETATION

    const chunkTrees = [];

    for (let i = 0; i < 25; i++) {

        const x = cx * size + (Math.random() - 0.5) * size;
        const z = cz * size + (Math.random() - 0.5) * size;

        if (isOnRoad(x, z)) continue;

        if (h(x, z) < WATER_LEVEL + 1) continue;

        const centerX = roadCenter(z);
        const dist = Math.abs(x - centerX);

        let obj;

        if (dist < 18) {
            obj = makeBush(x, z);
        } else {
            obj = makeTree(x, z);
        }

        if (!obj) continue;

        group.add(obj);

        chunkTrees.push({
            x,
            z,
            r: 2.5
        });
    }

    // TERRAIN

    const geo = new THREE.PlaneGeometry(size, size, 32, 32);

    geo.rotateX(-Math.PI / 2);

    const p = geo.attributes.position;

    for (let i = 0; i < p.count; i++) {

        const x = p.getX(i) + cx * size;
        const z = p.getZ(i) + cz * size;

        const centerX = roadCenter(z);
        const dist = Math.abs(x - centerX);

        const roadWidth = 12;
        const blendWidth = 18;

        let samples = 7;
        let sum = 0;

        for (let s = -3; s <= 3; s++) {

            let sampleX =
                centerX +
                (s * roadWidth / 6);

            sum += h(sampleX, z);
        }

        let avg = sum / samples;

        let blend = 0.9;

        let roadY =
            avg * blend +
            h(x, z) * (1 - blend);

        roadY += 0.25;

        let terrainY;

        if (dist < blendWidth) {

            let t = 1 - (dist / blendWidth);

            t = t * t * (3 - 2 * t);

            let orig = h(x, z);

            let target = Math.min(orig, roadY - 0.01);

            terrainY =
                orig * (1 - t) +
                target * t;

        } else {

            terrainY = h(x, z);
        }

        if (terrainY < WATER_LEVEL) {
            terrainY = WATER_LEVEL - 2;
        }

        p.setY(i, terrainY);
    }

    geo.computeVertexNormals();

    const terrain = new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({
            color: 0x6cab5a,
            roughness: 1
        })
    );

    terrain.position.set(cx * size, 0, cz * size);

    terrain.receiveShadow = true;

    group.add(terrain);

    scene.add(group);

    chunks.set(key(cx, cz), {
        group,
        trees: chunkTrees
    });

    trees.push(...chunkTrees);
}

for(let x=-2;x<=2;x++)
for(let z=-2;z<=2;z++)
makeChunk(x,z);

const car=new THREE.Group();

const body=new THREE.Mesh(
    new THREE.BoxGeometry(2.5,1,4),
    new THREE.MeshStandardMaterial({color:0xff4444})
);

body.position.y=0;
body.castShadow=true;
car.add(body);

scene.add(car);



const vel=new THREE.Vector3();
const ang=new THREE.Vector3();

let yaw=0;
let grounded=false;

car.position.set(0,30,0);



const wheels=[
new THREE.Vector3(-1.2,0, 1.4),
new THREE.Vector3( 1.2,0, 1.4),
new THREE.Vector3(-1.2,0,-1.4),
new THREE.Vector3( 1.2,0,-1.4)
];

const SUSP=1;
const SPRING=0.005;
const DAMPING=10;
const ENGINE=0.03;
const BRAKE=0.04;
const STEER=0.004;
const GRAVITY=0.01;

function loop() {
    requestAnimationFrame(loop);

    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

    // Road/grass physics
    const onRoad = carIsOnRoad();
    const MAX_SPEED_ROAD = 2;
    const MAX_SPEED_GRASS = 1.1;
    const ACCEL_ROAD = 0.0018;
    const ACCEL_GRASS = 0.0015;
    const BRAKE = 0.001;
    
    water.position.x = car.position.x;
    water.position.z = car.position.z;

    let maxSpeed = onRoad ? MAX_SPEED_ROAD : MAX_SPEED_GRASS;
    let accel = onRoad ? ACCEL_ROAD : ACCEL_GRASS;

    if (grounded) {
        if (keys.KeyW) vel.addScaledVector(forward, accel);
        if (keys.KeyS) vel.addScaledVector(forward, -BRAKE);
    }

    if (keys.KeyA) ang.y += STEER * vel.length();
    if (keys.KeyD) ang.y -= STEER * vel.length();

    // Clamp speed (XZ only)
    let flatSpeed = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
    if (flatSpeed > maxSpeed) {
        vel.x *= maxSpeed / flatSpeed;
        vel.z *= maxSpeed / flatSpeed;
    }

    vel.y -= GRAVITY;
    car.position.add(vel);

    for (const t of trees) {
        const dx = car.position.x - t.x;
        const dz = car.position.z - t.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < t.r + 1.5 && dist > 0.001) {
            const push = (t.r + 1.5 - dist) * 0.08;
            vel.x += dx / dist * push;
            vel.z += dz / dist * push;
        }
    }

    water.material.normalScale?.set?.(
        Math.sin(performance.now() * 0.001) * 0.02,
        Math.cos(performance.now() * 0.001) * 0.02
    );

    let comp = 0;
    let hits = 0;

    let onAnyRoad = false;
    for (const w of wheels) {
        const wx =
            car.position.x +
            w.x * Math.cos(yaw) - w.z * Math.sin(yaw);

        const wz =
            car.position.z +
            w.x * Math.sin(yaw) + w.z * Math.cos(yaw);

        let gy = worldFloorHeightAt(wx, wz);


        const dy = (car.position.y - SUSP) - gy;

        if (dy < 0) {
            comp += -dy;
            hits++;
        }
    }

    if (onAnyRoad) {
        car.rotation.z += (0 - car.rotation.z) * 0.2; // Smoothly lock roll to 0
    }

    grounded = hits > 0;
// MUCH BETTER VEHICLE DRAG MODEL

if (grounded) {

        vel.y += comp * SPRING;

        // separate horizontal drag
        vel.x *= onRoad ? 0.996 : 0.985;
        vel.z *= onRoad ? 0.996 : 0.985;

        // vertical damping
        vel.y *= 0.98;

    } else {

        // air resistance
        vel.x *= 0.999;
        vel.z *= 0.999;
    }

    // --- Four-wheel tilt only, car-local, raytraced ---
    const tilt = getCarTiltFromWheels(car.position, yaw, wheels);
    car.rotation.x += (tilt.pitch - car.rotation.x) * 0.05;
    car.rotation.z += (tilt.roll - car.rotation.z) * 0.05;
    // --- END ---

    car.rotation.y += ang.y;
    ang.multiplyScalar(grounded ? 0.85 : 0.995);
    yaw = car.rotation.y;

    sun.position.x = car.position.x + 120;
    sun.position.z = car.position.z + 80;

    sun.target.position.set(
        car.position.x,
        car.position.y,
        car.position.z
    );
    sun.target.updateMatrixWorld();

    const cam = new THREE.Vector3(
        car.position.x - Math.sin(yaw) * 10,
        car.position.y + 5,
        car.position.z - Math.cos(yaw) * 10
    );

    camera.position.lerp(cam, 0.1);
    camera.lookAt(car.position.x, car.position.y + 1.5, car.position.z);

    const cx = Math.floor(car.position.x / size);
    const cz = Math.floor(car.position.z / size);

    // LOAD CHUNKS

    for (let x = cx - CHUNK_RADIUS; x <= cx + CHUNK_RADIUS; x++) {

        for (let z = cz - CHUNK_RADIUS; z <= cz + CHUNK_RADIUS; z++) {

            if (!chunks.has(key(x, z))) {

                makeChunk(x, z);
            }
        }
    }

    // UNLOAD DISTANT CHUNKS

    for (const k of chunks.keys()) {

        const [x, z] = k.split(",").map(Number);

        if (
            Math.abs(x - cx) > CHUNK_RADIUS ||
            Math.abs(z - cz) > CHUNK_RADIUS
        ) {

            unloadChunk(x, z);
        }
    }

    renderer.render(scene, camera);
}




loop();

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
