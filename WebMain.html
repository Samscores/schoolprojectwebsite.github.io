<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connor</title>

<style>

/* =========================
   THEME VARIABLES
   ========================= */

:root {
    --bg: #ffffff;
    --text: #111111;
    --card: #f2f2f2;
    --cardText: #111111;

    /* FIXED IMAGE OVERLAY */
    --overlay: rgba(0,0,0,0.05);
}

body.dark {
    --bg: #111111;
    --text: #ffffff;
    --card: #1e1e1e;
    --cardText: #ffffff;

    /* softer than before so images are not greyed out */
    --overlay: rgba(0,0,0,0.45);
}

/* =========================
   BASE STYLES
   ========================= */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
}

/* HERO */
.hero {
    position: relative;
    height: 70vh;
    min-height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
    background: var(--bg);
}

.hero img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* IMAGE OVERLAY FIX */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--overlay);
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 2;
}

/* SCROLLER */
.scroll-wrapper {
    position: relative;
    overflow: hidden;
    width: 100%;
    padding: 40px 0;
    height: 160px;
}

.scroll-track {
    position: relative;
    height: 100%;
}

.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 15px 20px;
    background: var(--card);
    color: var(--cardText);

    z-index: 1000;
    box-sizing: border-box;
}

.logo {
    font-weight: bold;
}

/* RIGHT SIDE LINKS */
.nav-links {
    display: flex;
    gap: 20px;
    margin-left: auto; /* pushes to right */
}

.nav-links a {
    text-decoration: none;
    color: var(--cardText);
    transition: opacity 0.2s ease;
}

/* hover effect restored */
.nav-links a:hover {
    opacity: 0.5;
}
/* CARDS */
.card {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    min-width: 200px;
    padding: 20px;
    background: var(--card);
    color: var(--cardText);
    border-radius: 10px;
    text-align: center;
    transition: background 0.3s ease, color 0.3s ease;
}

</style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Connor</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Quotes</a>
            <a href="#">About</a>
        </div>
    </div>

<!-- HERO -->
<section class="hero">
    <img src="https://picsum.photos/1600/900">
    <div class="hero-content">
        <h1>"I just burned 57 calories."</h1>
        <p>- Connor</p>
    </div>
</section>

<!-- SCROLLER -->
<div class="scroll-wrapper">
    <div class="scroll-track" id="track">

        <div class="card">Item 1</div>
        <div class="card">Item 2</div>
        <div class="card">Item 3</div>
        <div class="card">Item 4</div>
        <div class="card">Item 5</div>
        <div class="card">Item 6</div>
        <div class="card">Item 7</div>

    </div>
</div>

<!-- HERO 2 -->
<section class="hero">
    <img src="https://media.prospectmagazine.co.uk/prod/images/landscape_large_fill/a20b27404d38-acemoglu-header-ai-illustration-by-justin-metz.jpg">
    <div class="hero-content">
        <h1>"without farts we are nothing."</h1>
        <p>- Connor</p>
    </div>
</section>


<a href="https://samscores.github.io./index" class="btn">Explore more</a>
<style>
    .btn {
        display: block;
        margin: 40px auto;
        width: fit-content;

        min-width: 200px;
        padding: 20px;

        background: var(--card);
        color: var(--cardText);

        border-radius: 10px;
        text-align: center;
        text-decoration: none;

        transition: transform 0.2s ease, background 0.3s ease, color 0.3s ease;
    }
    /* hover effect */
    .btn:hover {
        transform: scale(1.05);
        opacity: 0.8;
    }
</style>

<script>

/* =========================
   THEME DETECTION (LIVE)
   ========================= */

function setTheme(isDark) {
    document.body.classList.toggle("dark", isDark);
}

const media = window.matchMedia('(prefers-color-scheme: dark)');

setTheme(media.matches);

media.addEventListener('change', e => {
    setTheme(e.matches);
});

/* =========================
   SCROLLER LOGIC
   ========================= */

const track = document.getElementById("track");
const cards = Array.from(track.children);

const speed = 1;
const spacing = 250;
const spawnOffset = 300;

let positions = [];

let cardWidth = cards[0].offsetWidth;
let gap = 300;
let startX = 0;

cards.forEach((card, i) => {
    positions[i] = startX + i * (cardWidth + gap);
    card.style.left = positions[i] + "px";
});

function animate() {
    for (let i = 0; i < cards.length; i++) {
        positions[i] -= speed;

        if (positions[i] < -spacing) {
            const max = Math.max(...positions);
            positions[i] = max + spacing + spawnOffset;
        }

        cards[i].style.left = positions[i] + "px";
    }

    requestAnimationFrame(animate);
}

animate();



</script>

</body>
</html>
