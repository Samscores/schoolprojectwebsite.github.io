<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FPV Acro Simulator</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* TOP NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 15px 20px;

    background: rgba(0,0,0,0.85);
    color: white;

    z-index: 2000;

    box-sizing: border-box;

    border-bottom: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
}

.logo {
    font-weight: bold;
    font-size: 18px;
    color: white;
}

.nav-links {
    display: flex;
    gap: 20px;
    margin-left: auto;
}

.nav-links a {
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.nav-links a:hover {
    color: #6bff7f;
}

/* HUD PANEL */
#hud {
    position: absolute;

    /* moved down below navbar */
    top: 80px;
    left: 10px;

    color: white;

    background: rgba(0,0,0,0.65);

    padding: 14px;

    border-radius: 10px;

    z-index: 1500;

    width: 260px;

    backdrop-filter: blur(5px);
}

/* SLIDERS */
input[type="range"] {
    width: 100%;
    margin-top: 5px;
    margin-bottom: 14px;

    position: relative;
    z-index: 3000;
    cursor: pointer;
}

label {
    font-size: 12px;
    display: block;
}
</style>
</head>

<body>

<div id="hud">

<b>FPV SPEED TUNING</b><br><br>

<label>Pitch Speed: <span id="pv">50</span></label>
<input id="pitch" type="range" min="0" max="100" value="40">

<label>Roll Speed: <span id="rv">50</span></label>
<input id="roll" type="range" min="0" max="100" value="30">

<label>Yaw Speed: <span id="yv">50</span></label>
<input id="yaw" type="range" min="0" max="100" value="40">

<label>Throttle: <span id="tv">50</span></label>
<input id="throttle" type="range" min="0" max="100" value="50">

<!-- <label>Camera Angle: <span id="cv">0</span></label>
<input id="camAngle" type="range" min="0" max="80" value="0"> -->

</div>

    <div class="navbar">
        <div class="logo"> FPV SIM </div>
        <div class="nav-links">
            <a href="https://samscores.github.io/Website">  Website Main  </a>
        </div>
    </div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6bff7f);
// 0x87ceeb

const camera = new THREE.PerspectiveCamera(
    90,
    innerWidth/innerHeight,
    0.1,
    20000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.45));

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(200,300,200);
scene.add(sun);

// gnd

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20000,20000),
    new THREE.MeshStandardMaterial({ color:0x3fa34d })
);

ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const colliders = [];

for(let i=0;i<300;i++){

    const tree = new THREE.Group();

    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(10,10,100),
        new THREE.MeshStandardMaterial({ color:0x6b4423 })
    );

    const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(50,150,80),
        new THREE.MeshStandardMaterial({ color:0x228b22 })
    );

    leaves.position.y = 120;

    tree.add(trunk);
    tree.add(leaves);

    tree.position.set(
        (Math.random()-0.5)*8000,
        0,
        (Math.random()-0.5)*8000
    );

    scene.add(tree);

    colliders.push(new THREE.Box3().setFromObject(tree));
}


for(let i=0;i<120;i++){

    const h = 20 + Math.random()*2000;

    const b = new THREE.Mesh(
        new THREE.BoxGeometry(
            30+Math.random()*300,
            h,
            30+Math.random()*300
        ),
        new THREE.MeshStandardMaterial({
            // color: Math.random()*0xffffff
            color:0x126112
        })
    );

    b.position.set(
        (Math.random()-0.5)*6000,
        h/2,
        (Math.random()-0.5)*6000
    );

    b.castShadow = true;

    scene.add(b);

    colliders.push(new THREE.Box3().setFromObject(b));
}



camera.position.set(0,500,4000);

const drone = {

    velocity: new THREE.Vector3(),
    angularVelocity: new THREE.Vector3(),

    gravity: 0.09,
    drag: 0.99,
    maxSpeed: 30,

    rotationSpeed: 0.005
};


const ui = {
    pitch: document.getElementById("pitch"),
    roll: document.getElementById("roll"),
    yaw: document.getElementById("yaw"),
    throttle: document.getElementById("throttle"),
    // camAngle: document.getElementById("camAngle"),

    // cv: document.getElementById("cv"),
    pv: document.getElementById("pv"),
    rv: document.getElementById("rv"),
    yv: document.getElementById("yv"),
    tv: document.getElementById("tv")
};

function norm(v){ return v / 100; }


let gamepadIndex = null;

window.addEventListener("gamepadconnected",e=>{
    gamepadIndex = e.gamepad.index;
});

function dz(v,d=0.1){
    return Math.abs(v)<d ? 0 : v;
}


function collide(pos){

    const box = new THREE.Box3(
        new THREE.Vector3(pos.x-2,pos.y-2,pos.z-2),
        new THREE.Vector3(pos.x+2,pos.y+2,pos.z+2)
    );

    for(const c of colliders){
        if(box.intersectsBox(c)) return true;
    }

    return false;
}

const keys = {
    w: false,
    a: false,
    s: false,
    d: false,
    q: false,
    e: false,
    space: false
};

window.addEventListener("keydown", (e) => {

    const k = e.key.toLowerCase();

    if (k in keys) {
        keys[k] = true;
    }

    // Spacebar
    if (e.code === "Space") {
        keys.space = true;
    }
});

window.addEventListener("keyup", (e) => {

    const k = e.key.toLowerCase();

    if (k in keys) {
        keys[k] = false;
    }

    // Spacebar
    if (e.code === "Space") {
        keys.space = false;
    }
});

function animate(){

    requestAnimationFrame(animate);



    ui.pv.textContent = ui.pitch.value;
    ui.rv.textContent = ui.roll.value;
    ui.yv.textContent = ui.yaw.value;
    ui.tv.textContent = ui.throttle.value;
    // ui.cv.textContent = ui.camAngle.value;-



    let roll = 0;
    let pitch = 0;
    let yaw = 0;
    let throttle = 0;
    let prevCamOffset = 0;

    const gp = navigator.getGamepads()[gamepadIndex];


    // const camOffset = THREE.MathUtils.degToRad(Number(ui.camAngle.value));

    if(gp){

        throttle = -dz(gp.axes[1]);
        yaw = dz(gp.axes[0]);

        pitch = -dz(gp.axes[3]);
        roll = dz(gp.axes[2]);
    }


    // WASD fallback / support
    // 75% controller authority

    const keyboardScale = 0.75;

    if(keys.s) pitch = -keyboardScale;
    if(keys.w) pitch = keyboardScale;

    if(keys.q) roll = -keyboardScale;
    if(keys.e) roll = keyboardScale;

    if(keys.a) yaw = -keyboardScale;
    if(keys.d) yaw = keyboardScale;
    if(keys.space){
        throttle = 1.0;
    }


    const pitchRate = norm(ui.pitch.value) * 0.05;
    const rollRate = norm(ui.roll.value) * 0.05;
    const yawRate = norm(ui.yaw.value) * 0.05;
    const throttlePower = norm(ui.throttle.value) * 0.5;

    


    camera.rotateY(-yaw * yawRate);

    camera.rotateX(-pitch * pitchRate);

    camera.rotateZ(-roll * rollRate);

    const up = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);

    drone.velocity.addScaledVector(up, throttle * throttlePower);

    drone.velocity.y -= drone.gravity;

    drone.velocity.multiplyScalar(drone.drag);

    if(drone.velocity.length() > drone.maxSpeed){
        drone.velocity.setLength(drone.maxSpeed);
    }

    const next = camera.position.clone().add(drone.velocity);

    if(!collide(next)){
        camera.position.copy(next);
    } else {
        drone.velocity.multiplyScalar(-0.2);
        drone.angularVelocity.multiplyScalar(0.3);
    }

    if(camera.position.y < 2){
        camera.position.y = 2;
        if(drone.velocity.y < 0) drone.velocity.y *= -0.3;
    }
    

    renderer.render(scene,camera);
}

animate();


addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
